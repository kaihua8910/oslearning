<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock与改进Clock算法——内存页面的时钟置换法</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0d12;
            --bg-secondary: #111822;
            --bg-tertiary: #1a2332;
            --fg: #e8edf5;
            --muted: #6b7a8f;
            --accent: #ef4444;
            --accent-glow: rgba(239, 68, 68, 0.4);
            --used-on: #22c55e;
            --used-off: #374151;
            --dirty-on: #3b82f6;
            --dirty-off: #374151;
            --evict-ok: #10b981;
            --evict-dirty: #f59e0b;
            --disk-write: #06b6d4;
            --card: rgba(17, 24, 34, 0.95);
            --border: rgba(239, 68, 68, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* 背景 */
        .bg-pattern {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 30% 40%, rgba(239, 68, 68, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(34, 197, 94, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* 时钟容器 */
        .clock-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto;
        }

        .clock-ring {
            position: absolute;
            inset: 0;
            border: 3px solid var(--border);
            border-radius: 50%;
            background: radial-gradient(circle at center, var(--bg-secondary) 0%, var(--bg) 100%);
        }

        .clock-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, var(--bg-tertiary), var(--bg-secondary));
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* 时钟指针 */
        .clock-hand {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 150px;
            background: linear-gradient(to top, var(--accent), #f87171);
            transform-origin: bottom center;
            transform: translateX(-50%) translateY(-100%) rotate(0deg);
            border-radius: 2px;
            z-index: 15;
            transition: transform 0.4s ease;
        }

        .clock-hand::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 16px solid var(--accent);
        }

        .clock-hand.scanning {
            animation: hand-glow 0.5s ease-in-out infinite;
        }

        @keyframes hand-glow {
            0%, 100% { filter: drop-shadow(0 0 8px var(--accent-glow)); }
            50% { filter: drop-shadow(0 0 20px var(--accent-glow)); }
        }

        /* 页面框 */
        .page-frame {
            position: absolute;
            width: 80px;
            height: 70px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .page-frame.current {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .page-frame.evict-ok {
            border-color: var(--evict-ok);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .page-frame.evict-dirty {
            border-color: var(--evict-dirty);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
        }

        .page-frame.new-page {
            animation: page-enter 0.5s ease-out;
        }

        @keyframes page-enter {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .page-label {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .page-bits {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .bit-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .bit-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .bit-dot.used-on {
            background: var(--used-on);
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
        }

        .bit-dot.used-off {
            background: var(--used-off);
        }

        .bit-square {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            transition: all 0.3s;
        }

        .bit-square.dirty-on {
            background: var(--dirty-on);
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
        }

        .bit-square.dirty-off {
            background: var(--dirty-off);
        }

        .bit-label {
            font-size: 9px;
            color: var(--muted);
        }

        /* 磁盘区域 */
        .disk-area {
            background: var(--card);
            border: 2px solid rgba(6, 182, 212, 0.3);
            border-radius: 12px;
            padding: 16px;
        }

        .disk-storage {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .disk-block {
            height: 28px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .disk-block.writing {
            background: var(--disk-write);
            border-color: #22d3ee;
            animation: disk-write-pulse 0.3s ease 3;
        }

        @keyframes disk-write-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* 数据流动画 */
        .data-flow {
            position: fixed;
            pointer-events: none;
            z-index: 100;
        }

        .data-packet {
            position: absolute;
            width: 30px;
            height: 20px;
            background: linear-gradient(90deg, var(--disk-write), #22d3ee);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            opacity: 0;
            transition: all 0.6s ease;
        }

        .data-packet.moving {
            opacity: 1;
        }

        /* 优先级面板 */
        .priority-panel {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }

        .priority-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .priority-item:last-child {
            margin-bottom: 0;
        }

        .priority-item.highlight {
            border-left-color: var(--accent);
            background: rgba(239, 68, 68, 0.1);
        }

        .priority-item.success {
            border-left-color: var(--evict-ok);
            background: rgba(16, 185, 129, 0.1);
        }

        .priority-number {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            flex-shrink: 0;
        }

        .priority-bits {
            display: flex;
            gap: 4px;
        }

        .priority-bit {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        .priority-bit.zero {
            background: rgba(34, 197, 94, 0.2);
            color: var(--used-on);
            border: 1px solid var(--used-on);
        }

        .priority-bit.one {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        /* 状态提示 */
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.info {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .status-badge.warning {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.4);
        }

        .status-badge.success {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        /* 进度条 */
        .progress-bar {
            height: 4px;
            background: var(--bg-secondary);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--used-on), var(--disk-write));
            width: 0%;
            transition: width 0.1s linear;
        }

        /* 按钮 */
        .btn {
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #dc2626);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--card);
            color: var(--fg);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            border-color: var(--accent);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 场景指示器 */
        .scene-indicator {
            width: 24px;
            height: 4px;
            border-radius: 2px;
            background: var(--bg-secondary);
            transition: background 0.3s;
        }

        .scene-indicator.active {
            background: linear-gradient(90deg, var(--accent), var(--used-on));
        }

        /* 对比面板 */
        .compare-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .compare-card.basic {
            border-color: var(--used-on);
        }

        .compare-card.improved {
            border-color: var(--dirty-on);
        }

        /* 动画 */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .clock-container { width: 300px; height: 300px; }
            .clock-hand { height: 110px; }
            .page-frame { width: 60px; height: 55px; }
            .page-label { font-size: 12px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="bg-pattern"></div>

    <div class="relative z-10 max-w-6xl mx-auto px-4 py-5">
        <!-- 标题 -->
        <header class="text-center mb-4">
            <h1 class="text-xl md:text-2xl font-black mb-1 tracking-tight" id="main-title"></h1>
            <p class="text-sm text-[var(--muted)]" id="sub-title">LRU轻量化替代 · NRU最近未使用</p>
        </header>

        <!-- 进度条 -->
        <div class="progress-bar mb-4">
            <div class="progress-fill" id="progress"></div>
        </div>

        <!-- 算法标识 -->
        <div class="text-center mb-4" id="algorithm-display">
            <span class="status-badge info">基础 Clock 算法</span>
        </div>

        <!-- 主舞台 -->
        <div class="grid lg:grid-cols-[1fr_280px] gap-4 mb-4">
            <!-- 左侧：时钟区域 -->
            <div class="bg-[var(--card)] rounded-xl p-4 border border-[var(--border)]">
                <div class="text-center mb-3" id="status-display">
                    <span class="text-sm text-[var(--muted)]">点击开始演示</span>
                </div>
                
                <div class="clock-container" id="clock-container">
                    <div class="clock-ring"></div>
                    <div class="clock-center">
                        <span class="text-xs font-bold text-[var(--accent)]">CLOCK</span>
                    </div>
                    <div class="clock-hand" id="clock-hand"></div>
                    <!-- 页面框由JS生成 -->
                </div>

                <!-- 图例 -->
                <div class="flex justify-center gap-6 mt-4 text-xs">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-[var(--used-on)]"></div>
                        <span class="text-[var(--muted)]">U=1 已访问</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded bg-[var(--dirty-on)]"></div>
                        <span class="text-[var(--muted)]">D=1 已修改</span>
                    </div>
                </div>
            </div>

            <!-- 右侧：信息面板 -->
            <div class="space-y-4">
                <!-- 磁盘区域 -->
                <div class="disk-area">
                    <div class="flex items-center gap-2 mb-2">
                        <svg class="w-4 h-4 text-[var(--disk-write)]" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M2 20h20v-4H2v4zm2-3h2v2H4v-2zM2 4v4h20V4H2zm4 3H4V5h2v2zm-4 7h20v-4H2v4zm2-3h2v2H4v-2z"/>
                        </svg>
                        <span class="font-bold text-sm">磁盘存储</span>
                    </div>
                    <div class="disk-storage" id="disk-area">
                        <!-- 由JS生成 -->
                    </div>
                </div>

                <!-- 优先级面板 -->
                <div class="priority-panel" id="priority-panel">
                    <div class="text-sm font-bold mb-2">置换优先级</div>
                    <div id="priority-list">
                        <!-- 由JS生成 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 旁白区 -->
        <div class="bg-[var(--card)] rounded-xl p-4 border border-[var(--border)] mb-4">
            <div class="flex items-start gap-3">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-[var(--accent)] to-orange-500 flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <div>
                    <h4 class="font-bold text-sm mb-1">讲解</h4>
                    <p class="text-[var(--muted)] leading-relaxed text-sm transition-opacity duration-300" id="narration">点击"开始演示"按钮，观看Clock页面置换算法的完整演示。</p>
                </div>
            </div>
        </div>

        <!-- 控制区 -->
        <div class="flex items-center justify-center gap-3 flex-wrap mb-4">
            <button class="btn btn-primary" id="btn-start">
                <span class="flex items-center gap-2">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    开始演示
                </span>
            </button>
            <button class="btn btn-secondary" id="btn-pause" disabled>
                <span class="flex items-center gap-2" id="btn-pause-content">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                    暂停
                </span>
            </button>
            <button class="btn btn-secondary" id="btn-reset">
                <span class="flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    重置
                </span>
            </button>
            
            <div class="flex items-center gap-2 ml-3">
                <span class="text-xs text-[var(--muted)]">场景:</span>
                <div class="flex gap-1" id="scene-indicators">
                    <span class="scene-indicator" data-scene="1"></span>
                    <span class="scene-indicator" data-scene="2"></span>
                    <span class="scene-indicator" data-scene="3"></span>
                    <span class="scene-indicator" data-scene="4"></span>
                </div>
            </div>
        </div>

        <!-- 对比面板 -->
        <div id="compare-panel" class="hidden">
            <h3 class="text-lg font-bold mb-4 text-center">双算法对比</h3>
            <div class="grid md:grid-cols-2 gap-4">
                <div class="compare-card basic">
                    <h4 class="font-bold mb-3 text-[var(--used-on)]">基础 Clock (NRU)</h4>
                    <ul class="space-y-2 text-sm">
                        <li class="flex items-start gap-2">
                            <span class="text-[var(--used-on)]">-</span>
                            <span>仅使用访问位(U位)判断</span>
                        </li>
                        <li class="flex items-start gap-2">
                            <span class="text-[var(--used-on)]">-</span>
                            <span>循环扫描，U=1清零，U=0淘汰</span>
                        </li>
                        <li class="flex items-start gap-2">
                            <span class="text-[var(--evict-dirty)]">!</span>
                            <span>可能无故淘汰脏页</span>
                        </li>
                        <li class="flex items-start gap-2">
                            <span class="text-[var(--evict-dirty)]">!</span>
                            <span>产生额外磁盘写回开销</span>
                        </li>
                    </ul>
                </div>
                <div class="compare-card improved">
                    <h4 class="font-bold mb-3 text-[var(--dirty-on)]">改进 Clock</h4>
                    <ul class="space-y-2 text-sm">
                        <li class="flex items-start gap-2">
                            <span class="text-[var(--dirty-on)]">+</span>
                            <span>新增修改位(D位)判断</span>
                        </li>
                        <li class="flex items-start gap-2">
                            <span class="text-[var(--dirty-on)]">+</span>
                            <span>四级优先级置换策略</span>
                        </li>
                        <li class="flex items-start gap-2">
                            <span class="text-[var(--evict-ok)]">OK</span>
                            <span>优先淘汰非脏页</span>
                        </li>
                        <li class="flex items-start gap-2">
                            <span class="text-[var(--evict-ok)]">OK</span>
                            <span>大幅减少磁盘IO操作</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 状态管理 ====================
        var animationState = {
            isPlaying: false,
            isPaused: false,
            currentTime: 0,
            totalDuration: 120000,
            currentScene: 0
        };

        var progressIntervalId = null;
        var sceneTimeouts = [];

        var PAGE_COUNT = 5;
        var CLOCK_RADIUS = 160;
        var CLOCK_CENTER = 200;

        // 页面状态
        var pages = [];
        var handPosition = 0;
        var isImprovedClock = false;

        // 磁盘块
        var diskBlocks = ['D1', 'D2', 'D3', 'D4', 'D5', 'D6', 'D7', 'D8'];

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            initTitle();
            bindEvents();
            initPages();
            initDisk();
            renderPages();
            renderPriorityList();
        });

        function initTitle() {
            var titleText = 'Clock与改进Clock算法——内存页面的时钟置换法';
            var titleEl = document.getElementById('main-title');
            if (!titleEl) return;
            
            titleEl.innerHTML = '';
            for (var i = 0; i < titleText.length; i++) {
                var span = document.createElement('span');
                span.style.opacity = '0';
                span.style.animation = 'fadeIn 0.3s ease-out forwards';
                span.style.animationDelay = (i * 0.015) + 's';
                span.textContent = titleText[i];
                titleEl.appendChild(span);
            }
        }

        function bindEvents() {
            document.getElementById('btn-start').addEventListener('click', startAnimation);
            document.getElementById('btn-pause').addEventListener('click', togglePause);
            document.getElementById('btn-reset').addEventListener('click', resetAnimation);
        }

        function initPages() {
            pages = [
                { id: 'P1', used: true, dirty: false },
                { id: 'P2', used: true, dirty: true },
                { id: 'P3', used: false, dirty: false },
                { id: 'P4', used: true, dirty: false },
                { id: 'P5', used: false, dirty: true }
            ];
            handPosition = 0;
            isImprovedClock = false;
        }

        function initDisk() {
            var container = document.getElementById('disk-area');
            if (!container) return;
            
            var html = '';
            for (var i = 0; i < diskBlocks.length; i++) {
                html += '<div class="disk-block" id="disk-' + i + '">' + diskBlocks[i] + '</div>';
            }
            container.innerHTML = html;
        }

        function renderPages() {
            var container = document.getElementById('clock-container');
            if (!container) return;
            
            // 清除旧页面
            var oldPages = container.querySelectorAll('.page-frame');
            for (var i = 0; i < oldPages.length; i++) {
                oldPages[i].remove();
            }
            
            // 创建新页面
            for (var i = 0; i < pages.length; i++) {
                var angle = (i * 72 - 90) * Math.PI / 180; // 5个页面，每个72度
                var x = CLOCK_CENTER + CLOCK_RADIUS * Math.cos(angle) - 40;
                var y = CLOCK_CENTER + CLOCK_RADIUS * Math.sin(angle) - 35;
                
                var page = pages[i];
                var frame = document.createElement('div');
                frame.className = 'page-frame';
                frame.id = 'page-' + i;
                frame.style.left = x + 'px';
                frame.style.top = y + 'px';
                
                var usedClass = page.used ? 'used-on' : 'used-off';
                var dirtyClass = page.dirty ? 'dirty-on' : 'dirty-off';
                
                var bitsHtml = '<div class="page-label">' + page.id + '</div>';
                bitsHtml += '<div class="page-bits">';
                bitsHtml += '<div class="bit-indicator"><div class="bit-dot ' + usedClass + '"></div><span class="bit-label">U</span></div>';
                
                if (isImprovedClock) {
                    bitsHtml += '<div class="bit-indicator"><div class="bit-square ' + dirtyClass + '"></div><span class="bit-label">D</span></div>';
                }
                bitsHtml += '</div>';
                
                frame.innerHTML = bitsHtml;
                container.appendChild(frame);
            }
            
            updateHandPosition();
        }

        function renderPriorityList() {
            var container = document.getElementById('priority-list');
            if (!container) return;
            
            var priorities = [
                { u: 0, d: 0, desc: '未访问未修改', action: '直接淘汰' },
                { u: 0, d: 1, desc: '未访问已修改', action: '写回后淘汰' },
                { u: 1, d: 0, desc: '已访问未修改', action: '清零后判断' },
                { u: 1, d: 1, desc: '已访问已修改', action: '清零后判断' }
            ];
            
            var html = '';
            for (var i = 0; i < priorities.length; i++) {
                var p = priorities[i];
                html += '<div class="priority-item" id="priority-' + i + '">';
                html += '<div class="priority-number">' + (i + 1) + '</div>';
                html += '<div class="priority-bits">';
                html += '<div class="priority-bit ' + (p.u === 0 ? 'zero' : 'one') + '">' + p.u + '</div>';
                html += '<div class="priority-bit ' + (p.d === 0 ? 'zero' : 'one') + '">' + p.d + '</div>';
                html += '</div>';
                html += '<div class="flex-1">';
                html += '<div class="text-xs">' + p.desc + '</div>';
                html += '<div class="text-xs text-[var(--muted)]">' + p.action + '</div>';
                html += '</div>';
                html += '</div>';
            }
            container.innerHTML = html;
        }

        // ==================== 辅助函数 ====================
        function updateNarration(text) {
            var el = document.getElementById('narration');
            if (el) {
                el.style.opacity = '0';
                setTimeout(function() {
                    el.textContent = text;
                    el.style.opacity = '1';
                }, 150);
            }
        }

        function updateStatus(text, type) {
            var display = document.getElementById('status-display');
            if (!display) return;
            type = type || 'info';
            display.innerHTML = '<span class="status-badge ' + type + '">' + text + '</span>';
        }

        function updateAlgorithm(text) {
            var display = document.getElementById('algorithm-display');
            if (!display) return;
            display.innerHTML = '<span class="status-badge info">' + text + '</span>';
        }

        function setSceneIndicator(sceneNum) {
            animationState.currentScene = sceneNum;
            var container = document.getElementById('scene-indicators');
            if (!container) return;
            var indicators = container.querySelectorAll('.scene-indicator');
            for (var i = 0; i < indicators.length; i++) {
                if (i + 1 <= sceneNum) {
                    indicators[i].classList.add('active');
                } else {
                    indicators[i].classList.remove('active');
                }
            }
        }

        function updateHandPosition() {
            var hand = document.getElementById('clock-hand');
            if (hand) {
                var rotation = handPosition * 72;
                hand.style.transform = 'translateX(-50%) translateY(-100%) rotate(' + rotation + 'deg)';
            }
        }

        function highlightCurrentPage(index) {
            // 清除所有高亮
            var frames = document.querySelectorAll('.page-frame');
            for (var i = 0; i < frames.length; i++) {
                frames[i].classList.remove('current', 'evict-ok', 'evict-dirty');
            }
            
            // 高亮当前页
            var frame = document.getElementById('page-' + index);
            if (frame) frame.classList.add('current');
        }

        function markPageEvict(index, isDirty) {
            var frame = document.getElementById('page-' + index);
            if (frame) {
                frame.classList.remove('current');
                frame.classList.add(isDirty ? 'evict-dirty' : 'evict-ok');
            }
        }

        function setUsedBit(index, value) {
            pages[index].used = value;
            renderPages();
            highlightCurrentPage(index);
        }

        function setDirtyBit(index, value) {
            pages[index].dirty = value;
            renderPages();
            highlightCurrentPage(index);
        }

        function highlightPriority(index) {
            var items = document.querySelectorAll('.priority-item');
            for (var i = 0; i < items.length; i++) {
                items[i].classList.remove('highlight', 'success');
            }
            var item = document.getElementById('priority-' + index);
            if (item) item.classList.add('highlight');
        }

        function markPrioritySuccess(index) {
            var item = document.getElementById('priority-' + index);
            if (item) {
                item.classList.remove('highlight');
                item.classList.add('success');
            }
        }

        function writeToDisk(blockIndex) {
            var block = document.getElementById('disk-' + blockIndex);
            if (block) block.classList.add('writing');
            
            setTimeout(function() {
                if (block) block.classList.remove('writing');
            }, 1000);
        }

        function replacePage(index, newId) {
            pages[index] = { id: newId, used: true, dirty: false };
            renderPages();
            
            var frame = document.getElementById('page-' + index);
            if (frame) frame.classList.add('new-page');
        }

        // ==================== 场景函数 ====================
        // 场景一：开场引入
        function scene1() {
            setSceneIndicator(1);
            updateAlgorithm("LRU vs Clock 对比");
            updateNarration("我们之前学的LRU页面置换算法，效果好但硬件开销大，需要记录完整的访问时序。而Clock时钟算法，也叫NRU最近未使用算法，就是LRU的廉价平替，只用一个循环指针和访问位，就能实现近似LRU的置换效果。");
            updateStatus("算法背景介绍", "info");
            
            initPages();
            isImprovedClock = false;
            renderPages();
            
            // 高亮展示访问位
            sceneTimeouts.push(setTimeout(function() {
                highlightCurrentPage(0);
                updateStatus("访问位 U=1: 近期已使用", "success");
            }, 3000));
            
            sceneTimeouts.push(setTimeout(function() {
                highlightCurrentPage(2);
                updateStatus("访问位 U=0: 近期未使用", "warning");
            }, 6000));
        }

        // 场景二：基础Clock算法
        function scene2() {
            setSceneIndicator(2);
            updateAlgorithm("基础 Clock (NRU)");
            updateNarration("基础Clock算法逻辑很简单：内存满了要换页面，时钟指针顺时针转圈扫描。遇到最近用过的页面（访问位亮），就把它的使用标记清零，给它一次机会；遇到没使用过的页面（访问位灭），直接淘汰。");
            updateStatus("触发页面置换", "warning");
            
            initPages();
            isImprovedClock = false;
            renderPages();
            
            var hand = document.getElementById('clock-hand');
            if (hand) hand.classList.add('scanning');
            
            // 扫描演示
            sceneTimeouts.push(setTimeout(function() {
                highlightCurrentPage(0);
                updateStatus("扫描P1: U=1，清零放过", "info");
            }, 2000));
            
            sceneTimeouts.push(setTimeout(function() {
                setUsedBit(0, false);
                handPosition = 1;
                updateHandPosition();
                highlightCurrentPage(1);
                updateStatus("扫描P2: U=1，清零放过", "info");
            }, 4500));
            
            sceneTimeouts.push(setTimeout(function() {
                setUsedBit(1, false);
                handPosition = 2;
                updateHandPosition();
                highlightCurrentPage(2);
                updateStatus("扫描P3: U=0，可淘汰!", "success");
            }, 7000));
            
            sceneTimeouts.push(setTimeout(function() {
                markPageEvict(2, false);
                updateStatus("淘汰P3，载入新页面", "success");
            }, 9000));
            
            sceneTimeouts.push(setTimeout(function() {
                replacePage(2, 'P6');
                updateStatus("置换完成!", "success");
            }, 11000));
        }

        // 场景三：改进型Clock算法
        function scene3() {
            setSceneIndicator(3);
            updateAlgorithm("改进 Clock 算法");
            updateNarration("改进版Clock算法多了一个修改位，专门优化磁盘开销！它按四级优先级找淘汰页：优先淘汰没使用、也没修改的页面，完全不用写磁盘；实在没页面，再淘汰脏页，先写回磁盘再置换。大幅减少耗时的磁盘IO操作。");
            updateStatus("改进型: 新增修改位", "info");
            
            // 重置为改进版
            initPages();
            pages = [
                { id: 'P1', used: true, dirty: false },
                { id: 'P2', used: true, dirty: true },
                { id: 'P3', used: false, dirty: true },
                { id: 'P4', used: true, dirty: false },
                { id: 'P5', used: false, dirty: false }
            ];
            isImprovedClock = true;
            renderPages();
            renderPriorityList();
            
            var hand = document.getElementById('clock-hand');
            if (hand) hand.classList.add('scanning');
            
            // 第一轮：找 U=0, D=0
            sceneTimeouts.push(setTimeout(function() {
                highlightPriority(0);
                updateStatus("优先级1: 找 U=0, D=0", "info");
            }, 2000));
            
            sceneTimeouts.push(setTimeout(function() {
                highlightCurrentPage(4);
                updateStatus("P5符合 U=0, D=0，直接淘汰!", "success");
                markPrioritySuccess(0);
            }, 5000));
            
            // 演示脏页写回场景
            sceneTimeouts.push(setTimeout(function() {
                updateStatus("演示脏页场景...", "info");
                pages[4] = { id: 'P5', used: false, dirty: true }; // 改为脏页
                pages[0] = { id: 'P1', used: false, dirty: false }; // 改为可淘汰
                renderPages();
            }, 8000));
            
            sceneTimeouts.push(setTimeout(function() {
                highlightCurrentPage(0);
                updateStatus("P1符合 U=0, D=0，直接淘汰!", "success");
            }, 10000));
            
            // 演示写回磁盘
            sceneTimeouts.push(setTimeout(function() {
                updateNarration("如果是脏页淘汰，需要先写回磁盘再置换，这会产生额外的磁盘IO开销。改进Clock算法通过优先级策略，大幅减少了这种情况的发生。");
                highlightCurrentPage(2);
                markPageEvict(2, true);
                updateStatus("脏页P3需要写回磁盘", "warning");
                writeToDisk(0);
            }, 13000));
        }

        // 场景四：对比总结
        function scene4() {
            setSceneIndicator(4);
            updateAlgorithm("双算法对比");
            updateNarration("总结一下：基础Clock成本极低，适合低端硬件，但可能无故淘汰脏页产生额外开销；改进Clock多了脏页判断，用极小的复杂度代价，大幅减少磁盘操作，是工业界更常用的页面置换方案。");
            updateStatus("算法对比总结", "info");
            
            var hand = document.getElementById('clock-hand');
            if (hand) hand.classList.remove('scanning');
            
            // 显示对比面板
            var panel = document.getElementById('compare-panel');
            if (panel) {
                panel.classList.remove('hidden');
                panel.classList.add('fade-in');
            }
        }

        // ==================== 动画控制 ====================
        function clearAllTimers() {
            if (progressIntervalId) {
                clearInterval(progressIntervalId);
                progressIntervalId = null;
            }
            for (var i = 0; i < sceneTimeouts.length; i++) {
                clearTimeout(sceneTimeouts[i]);
            }
            sceneTimeouts = [];
        }

        function updateProgress() {
            if (!animationState.isPlaying) return;
            
            if (!animationState.isPaused) {
                animationState.currentTime += 100;
                var progress = Math.min((animationState.currentTime / animationState.totalDuration) * 100, 100);
                var progressEl = document.getElementById('progress');
                if (progressEl) {
                    progressEl.style.width = progress + '%';
                }
            }
        }

        function startAnimation() {
            if (animationState.isPlaying) return;
            
            animationState.isPlaying = true;
            animationState.isPaused = false;
            animationState.currentTime = 0;
            
            document.getElementById('btn-start').disabled = true;
            document.getElementById('btn-pause').disabled = false;
            
            var panel = document.getElementById('compare-panel');
            if (panel) panel.classList.add('hidden');
            
            clearAllTimers();
            initPages();
            initDisk();
            
            progressIntervalId = setInterval(updateProgress, 100);
            
            // 场景调度（总时长120秒）
            sceneTimeouts.push(setTimeout(function() {
                if (animationState.isPlaying && !animationState.isPaused) scene1();
            }, 0));
            
            sceneTimeouts.push(setTimeout(function() {
                if (animationState.isPlaying && !animationState.isPaused) scene2();
            }, 15000));
            
            sceneTimeouts.push(setTimeout(function() {
                if (animationState.isPlaying && !animationState.isPaused) scene3();
            }, 60000));
            
            sceneTimeouts.push(setTimeout(function() {
                if (animationState.isPlaying && !animationState.isPaused) scene4();
            }, 100000));
            
            sceneTimeouts.push(setTimeout(function() {
                animationComplete();
            }, 120000));
        }

        function togglePause() {
            animationState.isPaused = !animationState.isPaused;
            
            var btnContent = document.getElementById('btn-pause-content');
            if (btnContent) {
                if (animationState.isPaused) {
                    btnContent.innerHTML = '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> 继续';
                } else {
                    btnContent.innerHTML = '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg> 暂停';
                }
            }
        }

        function resetAnimation() {
            animationState.isPlaying = false;
            animationState.isPaused = false;
            animationState.currentTime = 0;
            animationState.currentScene = 0;
            
            clearAllTimers();
            
            document.getElementById('progress').style.width = '0%';
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-pause').disabled = true;
            
            var panel = document.getElementById('compare-panel');
            if (panel) panel.classList.add('hidden');
            
            var hand = document.getElementById('clock-hand');
            if (hand) hand.classList.remove('scanning');
            
            initPages();
            isImprovedClock = false;
            renderPages();
            renderPriorityList();
            
            updateNarration('点击"开始演示"按钮，观看Clock页面置换算法的完整演示。');
            updateStatus("点击开始演示", "info");
            updateAlgorithm("基础 Clock 算法");
            setSceneIndicator(0);
        }

        function animationComplete() {
            animationState.isPlaying = false;
            if (progressIntervalId) {
                clearInterval(progressIntervalId);
                progressIntervalId = null;
            }
            
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-pause').disabled = true;
        }
    </script>
</body>
</html>
