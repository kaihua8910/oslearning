<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>读者-写者问题 - 图书馆的魔法书</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14;
            --fg: #ffffff;
            --muted: #9ca3af;
            --accent: #22d3ee;
            --card: #1a1f2e;
            --border: #3b4252;
            
            --reader: #4ade80;
            --writer: #f87171;
            --fair: #fbbf24;
            --reader-bg: rgba(74, 222, 128, 0.15);
            --writer-bg: rgba(248, 113, 113, 0.15);
            --fair-bg: rgba(251, 191, 36, 0.15);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        
        .bg-gradient {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 60% 40% at 30% 20%, rgba(74, 222, 128, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 30% at 70% 80%, rgba(248, 113, 113, 0.08) 0%, transparent 50%);
        }
        
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 16px 24px;
        }
        
        .header {
            text-align: center;
            opacity: 0;
            transform: translateY(-30px);
            transition: all 0.8s ease;
        }
        
        .header.visible { opacity: 1; transform: translateY(0); }
        
        .main-title {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 900;
        }
        
        .sub-title {
            font-size: 0.9rem;
            color: var(--muted);
            margin-top: 4px;
        }
        
        .hint-container { text-align: center; margin-top: 10px; min-height: 44px; }
        
        .hint-box {
            display: inline-block;
            background: var(--card);
            border: 2px solid var(--border);
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            max-width: min(800px, 92vw);
            opacity: 0;
            transform: translateY(-15px);
            transition: all 0.5s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .hint-box.visible { opacity: 1; transform: translateY(0); }
        .hint-box .highlight { color: var(--accent); font-weight: 700; }
        .hint-box .success { color: var(--reader); font-weight: 700; }
        .hint-box .warning { color: var(--writer); font-weight: 700; }
        
        /* 控制栏 */
        .top-controls {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card);
            border: 2px solid var(--border);
            padding: 8px 16px;
            border-radius: 50px;
            z-index: 300;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        
        .ctrl-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: var(--bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        
        .ctrl-btn:hover { transform: scale(1.1); filter: brightness(1.2); }
        .ctrl-btn.secondary { background: var(--border); color: var(--fg); }
        .ctrl-btn svg { width: 18px; height: 18px; }
        
        .progress-track { width: 100px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--reader)); width: 0%; transition: width 0.1s linear; }
        .scene-label { font-size: 0.8rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
        
        /* 主布局 */
        .main-layout {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            margin-top: 12px;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        
        .main-layout.visible { opacity: 1; }
        
        /* 左侧舞台 */
        .stage-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .library-container {
            flex: 1;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            min-height: 400px;
        }
        
        .library-stage {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(ellipse at center, #1a1f2e 0%, #0f1419 100%);
        }
        
        .magic-book {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 160px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
            transition: all 0.3s ease;
        }
        
        .magic-book.reading { 
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.5);
        }
        
        .magic-book.writing { 
            background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
            box-shadow: 0 0 30px rgba(248, 113, 113, 0.5);
        }
        
        .character {
            position: absolute;
            width: 60px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.5s ease;
            opacity: 0;
            transform: scale(0.8);
        }
        
        .character.visible { opacity: 1; transform: scale(1); }
        
        .character.reader {
            background: var(--reader-bg);
            border: 3px solid var(--reader);
            color: var(--reader);
        }
        
        .character.writer {
            background: var(--writer-bg);
            border: 3px solid var(--writer);
            color: var(--writer);
        }
        
        .queue-area {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
        }
        
        .queue-character {
            width: 50px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 2px solid;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }
        
        .queue-character.visible { opacity: 1; transform: translateY(0); }
        
        .queue-character.reader {
            background: var(--reader-bg);
            border-color: var(--reader);
            color: var(--reader);
        }
        
        .queue-character.writer {
            background: var(--writer-bg);
            border-color: var(--writer);
            color: var(--writer);
        }
        
        .queue-character.waiting {
            filter: brightness(0.5);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        
        .stats-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            min-width: 140px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 0.8rem;
        }
        
        .stat-label { color: var(--muted); }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
        
        /* 右侧面板 */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .info-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.5s ease;
        }
        
        .info-card.visible { opacity: 1; transform: translateX(0); }
        
        .info-title {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        
        .strategy-btn {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--fg);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            font-size: 0.8rem;
        }
        
        .strategy-btn:hover { border-color: var(--accent); }
        .strategy-btn.active { 
            border-color: var(--accent); 
            background: rgba(34, 211, 238, 0.15);
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.3);
        }
        
        .strategy-btn .highlight {
            color: var(--accent);
            font-weight: 700;
        }
        
        .comparison-panel {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            opacity: 0;
            transition: all 0.5s ease;
        }
        
        .comparison-panel.visible { opacity: 1; }
        
        .comparison-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }
        
        .comparison-row.read-priority { background: rgba(74, 222, 128, 0.1); border: 1px solid var(--reader); }
        .comparison-row.write-priority { background: rgba(248, 113, 113, 0.1); border: 1px solid var(--writer); }
        .comparison-row.fair { background: rgba(251, 191, 36, 0.1); border: 1px solid var(--fair); }
        
        .comparison-label { font-weight: 600; }
        .comparison-value { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
        .comparison-row.read-priority .comparison-value { color: var(--reader); }
        .comparison-row.write-priority .comparison-value { color: var(--writer); }
        .comparison-row.fair .comparison-value { color: var(--fair); }
        
        .interact-hint {
            background: rgba(34, 211, 238, 0.1);
            border: 2px solid var(--accent);
            border-radius: 10px;
            padding: 10px;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.5s ease;
            font-size: 0.75rem;
            color: var(--muted);
        }
        
        .interact-hint.visible { opacity: 1; }
        
        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 1fr; }
        }
        
        @media (max-width: 768px) {
            .main-container { padding: 12px; }
            .top-controls { padding: 6px 12px; gap: 8px; }
            .progress-track { width: 70px; }
        }
    </style>
</head>
<body>
    <div class="bg-layer">
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
    </div>
    
    <div class="top-controls">
        <button class="ctrl-btn" id="playBtn">
            <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <button class="ctrl-btn secondary" id="resetBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="scene-label" id="sceneLabel">场景 1/4</div>
    </div>
    
    <div class="main-container">
        <header class="header" id="header">
            <h1 class="main-title">读者-写者问题</h1>
            <p class="sub-title">图书馆的魔法书：读写争夺战</p>
            <div class="hint-container">
                <div class="hint-box" id="hintBox"></div>
            </div>
        </header>
        
        <div class="main-layout" id="mainLayout">
            <div class="stage-section">
                <div class="library-container">
                    <div class="library-stage" id="libraryStage">
                        <div class="magic-book" id="magicBook">📖</div>
                        
                        <!-- 角色 -->
                        <div class="character reader" id="reader1" style="left: 15%; top: 25%;">👓</div>
                        <div class="character reader" id="reader2" style="left: 25%; top: 20%;">👓</div>
                        <div class="character reader" id="reader3" style="left: 35%; top: 25%;">👓</div>
                        <div class="character writer" id="writer1" style="left: 65%; top: 25%;">✍️</div>
                        <div class="character writer" id="writer2" style="left: 75%; top: 20%;">✍️</div>
                        
                        <!-- 统计 -->
                        <div class="stats-overlay">
                            <div class="stat-item">
                                <span class="stat-label">读者:</span>
                                <span class="stat-value" id="readerCount">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">写者:</span>
                                <span class="stat-value" id="writerCount">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">等待:</span>
                                <span class="stat-value" id="waitingCount">0</span>
                            </div>
                        </div>
                        
                        <!-- 队列 -->
                        <div class="queue-area" id="queueArea"></div>
                    </div>
                </div>
            </div>
            
            <div class="side-panel">
                <div class="info-card" id="strategyCard">
                    <div class="info-title">调度策略</div>
                    <div class="strategy-btn" data-strategy="read-priority">
                        <div class="highlight">读优先</div>
                        读者可并行，写者独占
                    </div>
                    <div class="strategy-btn" data-strategy="write-priority">
                        <div class="highlight">写优先</div>
                        写者优先，新读者等待
                    </div>
                    <div class="strategy-btn" data-strategy="fair">
                        <div class="highlight">公平策略</div>
                        FIFO队列，按序服务
                    </div>
                    <div class="interact-hint" id="interactHint">
                        💡 点击不同策略按钮，观察魔法书状态变化与角色行为差异
                    </div>
                </div>
                
                <div class="comparison-panel" id="comparisonPanel">
                    <div class="info-title">策略对比</div>
                    <div class="comparison-row read-priority">
                        <span class="comparison-label">读优先</span>
                        <span class="comparison-value">写者饥饿</span>
                    </div>
                    <div class="comparison-row write-priority">
                        <span class="comparison-label">写优先</span>
                        <span class="comparison-value">读者饥饿</span>
                    </div>
                    <div class="comparison-row fair">
                        <span class="comparison-label">公平</span>
                        <span class="comparison-value">无饥饿</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ========== 配置 ==========
        const CONFIG = {
            bookPosition: { x: 50, y: 50 },
            readerPositions: [
                { left: '15%', top: '25%' },
                { left: '25%', top: '20%' },
                { left: '35%', top: '25%' }
            ],
            writerPositions: [
                { left: '65%', top: '25%' },
                { left: '75%', top: '20%' }
            ]
        };
        
        // ========== 状态 ==========
        const state = {
            isPlaying: false,
            currentScene: 0,
            sceneTime: 0,
            animationFrame: null,
            lastTimestamp: 0,
            currentStrategy: 'read-priority',
            readers: 0,
            writers: 0,
            waiting: 0,
            queue: []
        };
        
        const executedActions = new Set();
        
        // ========== DOM引用 ==========
        let dom = {};
        
        // ========== 场景配置 ==========
        function createScenes() {
            const scenes = [
                {
                    name: '无锁灾难',
                    duration: 8000,
                    actions: [
                        { time: 0, type: 'showHeader' },
                        { time: 300, type: 'showHint', text: '没有规则时，所有人争抢同一本魔法书，数据将支离破碎...' },
                        { time: 1000, type: 'showLayout' },
                        { time: 1500, type: 'showCharacters' },
                        { time: 4000, type: 'showDataCorruption' },
                        { time: 6000, type: 'showAdminIntervention' }
                    ]
                },
                {
                    name: '读优先策略',
                    duration: 10000,
                    actions: [
                        { time: 0, type: 'showHint', text: '管理员举起<span class="highlight">读优先</span>令牌：读者可并行，写者必须等待！' },
                        { time: 500, type: 'setStrategy', strategy: 'read-priority' },
                        { time: 1000, type: 'addReaders', count: 3 },
                        { time: 4000, type: 'addWriter' },
                        { time: 6000, type: 'showStarvation', victim: 'writer' }
                    ]
                },
                {
                    name: '写优先策略',
                    duration: 10000,
                    actions: [
                        { time: 0, type: 'showHint', text: '管理员切换<span class="highlight">写优先</span>令牌：新读者必须等待写者！' },
                        { time: 500, type: 'setStrategy', strategy: 'write-priority' },
                        { time: 1000, type: 'resetScene' },
                        { time: 1500, type: 'addWriter' },
                        { time: 3000, type: 'blockReaders' },
                        { time: 6000, type: 'showStarvation', victim: 'reader' }
                    ]
                },
                {
                    name: '公平策略',
                    duration: 10000,
                    actions: [
                        { time: 0, type: 'showHint', text: '管理员拿出<span class="highlight">公平令牌</span>：FIFO队列，按到达顺序服务！' },
                        { time: 500, type: 'setStrategy', strategy: 'fair' },
                        { time: 1000, type: 'resetScene' },
                        { time: 1500, type: 'buildQueue' },
                        { time: 5000, type: 'showFairExecution' },
                        { time: 8000, type: 'showSummary' }
                    ]
                }
            ];
            return scenes;
        }
        
        const scenes = createScenes();
        
        // ========== 初始化 ==========
        function init() {
            // DOM引用
            dom.header = document.getElementById('header');
            dom.hintBox = document.getElementById('hintBox');
            dom.mainLayout = document.getElementById('mainLayout');
            dom.magicBook = document.getElementById('magicBook');
            dom.libraryStage = document.getElementById('libraryStage');
            dom.queueArea = document.getElementById('queueArea');
            
            dom.readerCount = document.getElementById('readerCount');
            dom.writerCount = document.getElementById('writerCount');
            dom.waitingCount = document.getElementById('waitingCount');
            
            dom.strategyCard = document.getElementById('strategyCard');
            dom.comparisonPanel = document.getElementById('comparisonPanel');
            dom.interactHint = document.getElementById('interactHint');
            
            dom.playBtn = document.getElementById('playBtn');
            dom.playIcon = document.getElementById('playIcon');
            dom.resetBtn = document.getElementById('resetBtn');
            dom.progressFill = document.getElementById('progressFill');
            dom.sceneLabel = document.getElementById('sceneLabel');
            
            // 事件
            dom.playBtn.addEventListener('click', togglePlayback);
            dom.resetBtn.addEventListener('click', resetAnimation);
            
            document.addEventListener('keydown', e => {
                if (e.code === 'Space') { e.preventDefault(); togglePlayback(); }
                else if (e.code === 'KeyR') resetAnimation();
            });
            
            // 策略按钮事件
            document.querySelectorAll('.strategy-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const strategy = btn.dataset.strategy;
                    setStrategy(strategy);
                });
            });
            
            updateSceneLabel();
        }
        
        // ========== 策略控制 ==========
        function setStrategy(strategy) {
            state.currentStrategy = strategy;
            
            // 更新按钮状态
            document.querySelectorAll('.strategy-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.strategy === strategy) {
                    btn.classList.add('active');
                }
            });
            
            updateBookState();
        }
        
        function updateBookState() {
            if (state.writers > 0) {
                dom.magicBook.className = 'magic-book writing';
            } else if (state.readers > 0) {
                dom.magicBook.className = 'magic-book reading';
            } else {
                dom.magicBook.className = 'magic-book';
            }
        }
        
        // ========== 播放控制 ==========
        function togglePlayback() {
            state.isPlaying = !state.isPlaying;
            dom.playIcon.innerHTML = state.isPlaying 
                ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
                : '<polygon points="5,3 19,12 5,21"/>';
            
            if (state.isPlaying) {
                state.lastTimestamp = performance.now();
                runAnimation();
            } else {
                cancelAnimationFrame(state.animationFrame);
            }
        }
        
        function resetAnimation() {
            cancelAnimationFrame(state.animationFrame);
            state.isPlaying = false;
            state.currentScene = 0;
            state.sceneTime = 0;
            state.readers = 0;
            state.writers = 0;
            state.waiting = 0;
            state.queue = [];
            state.currentStrategy = 'read-priority';
            executedActions.clear();
            
            dom.playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
            dom.progressFill.style.width = '0%';
            
            dom.header.classList.remove('visible');
            dom.hintBox.classList.remove('visible');
            dom.mainLayout.classList.remove('visible');
            dom.strategyCard.classList.remove('visible');
            dom.comparisonPanel.classList.remove('visible');
            dom.interactHint.classList.remove('visible');
            
            // 隐藏所有角色
            document.querySelectorAll('.character').forEach(char => {
                char.classList.remove('visible');
            });
            
            dom.queueArea.innerHTML = '';
            updateStats();
            updateBookState();
            updateSceneLabel();
        }
        
        // ========== 动画循环 ==========
        function runAnimation() {
            if (!state.isPlaying) return;
            
            const now = performance.now();
            state.sceneTime += now - state.lastTimestamp;
            state.lastTimestamp = now;
            
            const scene = scenes[state.currentScene];
            if (!scene) {
                state.isPlaying = false;
                dom.playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
                return;
            }
            
            dom.progressFill.style.width = `${((state.currentScene + state.sceneTime / scene.duration) / scenes.length) * 100}%`;
            
            scene.actions.forEach((a, i) => {
                const key = `${state.currentScene}-${i}`;
                if (state.sceneTime >= a.time && !executedActions.has(key)) {
                    executedActions.add(key);
                    executeAction(a);
                }
            });
            
            if (state.sceneTime >= scene.duration) {
                state.currentScene++;
                state.sceneTime = 0;
                executedActions.clear();
                updateSceneLabel();
                
                if (state.currentScene >= scenes.length) {
                    state.isPlaying = false;
                    dom.playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
                    return;
                }
            }
            
            state.animationFrame = requestAnimationFrame(runAnimation);
        }
        
        // ========== 动作执行 ==========
        function executeAction(a) {
            switch (a.type) {
                case 'showHeader':
                    dom.header.classList.add('visible');
                    break;
                    
                case 'showHint':
                    dom.hintBox.innerHTML = a.text;
                    dom.hintBox.classList.add('visible');
                    break;
                    
                case 'showLayout':
                    dom.mainLayout.classList.add('visible');
                    dom.strategyCard.classList.add('visible');
                    break;
                    
                case 'showCharacters':
                    showCharacters();
                    break;
                    
                case 'showDataCorruption':
                    showDataCorruption();
                    break;
                    
                case 'showAdminIntervention':
                    showAdminIntervention();
                    break;
                    
                case 'setStrategy':
                    setStrategy(a.strategy);
                    break;
                    
                case 'addReaders':
                    addReaders(a.count);
                    break;
                    
                case 'addWriter':
                    addWriter();
                    break;
                    
                case 'showStarvation':
                    showStarvation(a.victim);
                    break;
                    
                case 'resetScene':
                    resetScene();
                    break;
                    
                case 'blockReaders':
                    blockReaders();
                    break;
                    
                case 'buildQueue':
                    buildQueue();
                    break;
                    
                case 'showFairExecution':
                    showFairExecution();
                    break;
                    
                case 'showSummary':
                    dom.comparisonPanel.classList.add('visible');
                    dom.interactHint.classList.add('visible');
                    break;
            }
        }
        
        // ========== 角色动画 ==========
        function showCharacters() {
            const readers = document.querySelectorAll('.character.reader');
            const writers = document.querySelectorAll('.character.writer');
            
            readers.forEach((reader, i) => {
                setTimeout(() => {
                    reader.classList.add('visible');
                }, i * 200);
            });
            
            writers.forEach((writer, i) => {
                setTimeout(() => {
                    writer.classList.add('visible');
                }, (i + readers.length) * 200);
            });
        }
        
        function addReaders(count) {
            state.readers += count;
            updateStats();
            updateBookState();
        }
        
        function addWriter() {
            state.writers += 1;
            updateStats();
            updateBookState();
        }
        
        function resetScene() {
            state.readers = 0;
            state.writers = 0;
            state.waiting = 0;
            state.queue = [];
            updateStats();
            updateBookState();
        }
        
        function blockReaders() {
            state.waiting += 3;
            updateStats();
        }
        
        function buildQueue() {
            const queueOrder = ['reader', 'reader', 'writer', 'reader', 'reader'];
            state.queue = queueOrder;
            
            dom.queueArea.innerHTML = '';
            queueOrder.forEach((type, i) => {
                setTimeout(() => {
                    const char = document.createElement('div');
                    char.className = `queue-character ${type}`;
                    char.textContent = type === 'reader' ? '👓' : '✍️';
                    dom.queueArea.appendChild(char);
                    requestAnimationFrame(() => char.classList.add('visible'));
                }, i * 150);
            });
        }
        
        function showDataCorruption() {
            dom.magicBook.style.animation = 'shake 0.5s ease-in-out 3';
            setTimeout(() => {
                dom.magicBook.style.animation = '';
            }, 1500);
        }
        
        function showAdminIntervention() {
            // 管理员干预效果
            dom.magicBook.style.boxShadow = '0 0 40px rgba(251, 191, 36, 0.8)';
            setTimeout(() => {
                dom.magicBook.style.boxShadow = '';
            }, 2000);
        }
        
        function showStarvation(victim) {
            if (victim === 'writer') {
                dom.hintBox.innerHTML = '写者长期等待，出现<span class="warning">饥饿现象</span>！';
            } else {
                dom.hintBox.innerHTML = '读者长期等待，出现<span class="warning">饥饿现象</span>！';
            }
        }
        
        function showFairExecution() {
            // 演示公平执行
            if (state.queue.length > 0) {
                const next = state.queue.shift();
                if (next === 'reader') {
                    state.readers += 1;
                } else {
                    state.writers += 1;
                }
                updateStats();
                updateBookState();
                
                // 移除队列中的第一个
                const firstChar = dom.queueArea.querySelector('.queue-character');
                if (firstChar) {
                    firstChar.style.opacity = '0';
                    setTimeout(() => firstChar.remove(), 300);
                }
            }
        }
        
        function updateStats() {
            dom.readerCount.textContent = state.readers;
            dom.writerCount.textContent = state.writers;
            dom.waitingCount.textContent = state.waiting;
        }
        
        function updateSceneLabel() {
            dom.sceneLabel.textContent = `场景 ${state.currentScene + 1}/${scenes.length}`;
        }
        
        // 启动
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
